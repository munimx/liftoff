version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: liftoff_postgres
    environment:
      POSTGRES_DB: liftoff
      POSTGRES_USER: liftoff
      POSTGRES_PASSWORD: liftoff
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U liftoff -d liftoff']
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: liftoff_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development
    container_name: liftoff_api
    ports:
      - '4000:4000'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/config:/app/packages/config
      - api_node_modules:/app/node_modules
      - api_apps_node_modules:/app/apps/api/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://liftoff:liftoff@postgres:5432/liftoff
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
      - JWT_REFRESH_SECRET=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
      - GITHUB_CLIENT_ID=github_client_id
      - GITHUB_CLIENT_SECRET=github_client_secret
      - GITHUB_CALLBACK_URL=http://localhost:4000/api/auth/github/callback
      - GITHUB_WEBHOOK_SECRET=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0
      - DO_API_TOKEN=${DO_API_TOKEN:-}
      - DO_SPACES_ACCESS_KEY=${DO_SPACES_ACCESS_KEY:-}
      - DO_SPACES_SECRET_KEY=${DO_SPACES_SECRET_KEY:-}
      - DO_SPACES_BUCKET=liftoff-pulumi-state
      - DO_SPACES_ENDPOINT=https://nyc3.digitaloceanspaces.com
      - DO_SPACES_REGION=nyc3
      - PULUMI_PASSPHRASE=liftoff_dev_passphrase
      - ENCRYPTION_KEY=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: development
    container_name: liftoff_web
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/app:/app/apps/web/app
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/config:/app/packages/config
      - web_node_modules:/app/node_modules
      - web_apps_node_modules:/app/apps/web/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=http://localhost:4000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  api_apps_node_modules:
  web_node_modules:
  web_apps_node_modules: