version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: liftoff_postgres
    environment:
      POSTGRES_DB: liftoff
      POSTGRES_USER: liftoff
      POSTGRES_PASSWORD: liftoff
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U liftoff -d liftoff']
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: liftoff_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s

volumes:
  postgres_data:
  redis_data:
